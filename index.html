<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interview Answer Generator For Freshers</title>

<meta name="description"
content="Generate professional interview answers for freshers instantly.">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Interview Answer Generator</h1>

<p>
Enter an interview question and generate a sample answer.
</p>

<textarea
id="question"
placeholder="Tell me about yourself">
</textarea>

<button onclick="generateAnswer()">
Generate Answer
</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
